name: Build

on:
  push:
    branches:
      - nickelcloud
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with NickelHook submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build with NickelTC
        run: |
          docker run --rm \
            -v "$PWD:$PWD" -w "$PWD" \
            -u "$(id -u):$(id -g)" -e HOME=/tmp \
            ghcr.io/pgaskin/nickeltc:1 \
            sh -c 'make && make koboroot'

      - name: Upload KoboRoot.tgz
        uses: actions/upload-artifact@v7
        with:
          path: KoboRoot.tgz
          archive: false
