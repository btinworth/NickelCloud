name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with NickelHook submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build with NickelTC
        run: |
          docker run --rm \
            -v "$PWD:$PWD" -w "$PWD" \
            -u "$(id -u):$(id -g)" -e HOME=/tmp \
            ghcr.io/pgaskin/nickeltc:1 \
            sh -c 'make && make koboroot'

      - name: Upload KoboRoot.tgz
        uses: actions/upload-artifact@v7
        with:
          path: KoboRoot.tgz
          archive: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" KoboRoot.tgz --generate-notes
